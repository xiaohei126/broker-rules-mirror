name: Update Broker Rules

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Split upstream rules
        run: python scripts/split.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/domain.yaml rule/ip.yaml rule/domain.list rule/ip.list
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto update rules $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
